<!DOCTYPE html>
<html>

<head>
  <script>
    let globalId = 1;
    let todoState = [];
    let oldTodoState = [];

    function addTodoToDom(todo) {
      // Create the parent div
      const parentDiv = document.createElement("div");
      parentDiv.setAttribute("id", todo.id);

      // Create and add title
      const titleDiv = document.createElement("div");
      titleDiv.innerHTML = todo.title;

      // Create and add description
      const descriptionDiv = document.createElement("div");
      descriptionDiv.innerHTML = todo.description;

      // Create and add delete button
      const deleteButton = document.createElement("button");
      deleteButton.innerHTML = "Delete";
      deleteButton.onclick = function () {
        deleteTodo(todo.id);
      };

      // Append all elements to parent
      parentDiv.appendChild(titleDiv);
      parentDiv.appendChild(descriptionDiv);
      parentDiv.appendChild(deleteButton);

      // Add to DOM
      document.getElementById("todos").appendChild(parentDiv);
    }

    function removeTodoFromDom(todo) {
      // Find the element by its id and remove it
      const element = document.getElementById(todo.id);
      if (element) {
        element.remove();
      }
    }

    function updateTodoInDom(oldTodo, newTodo) {
      // Find the existing element
      const element = document.getElementById(oldTodo.id);
      if (element) {
        // Update the title (first child)
        element.children[0].innerHTML = newTodo.title;
        // Update the description (second child)
        element.children[1].innerHTML = newTodo.description;
      }
    }

    function updateState(newTodos) {
      // calculate the diff b/w newTodos and oldTodos.
      // More specifically, find out what todos are - 
      // 1. added
      // 2. deleted
      // 3. updated
      const added = [];
      const deleted = [];
      const updated = [];

      // Find added and updated todos
      newTodos.forEach(newTodo => {
        const oldTodo = oldTodoState.find(todo => todo.id === newTodo.id);
        if (!oldTodo) {
          // If todo doesn't exist in old state, it's added
          added.push(newTodo);
        } else {
          // If todo exists, check if it's updated
          if (oldTodo.title !== newTodo.title || oldTodo.description !== newTodo.description) {
            updated.push({ oldTodo, newTodo });
          }
        }
      });

      // Find deleted todos
      oldTodoState.forEach(oldTodo => {
        const newTodo = newTodos.find(todo => todo.id === oldTodo.id);
        if (!newTodo) {
          // If todo doesn't exist in new state, it's deleted
          deleted.push(oldTodo);
        }
      });

      // Call appropriate functions
      added.forEach(todo => addTodoToDom(todo));
      deleted.forEach(todo => removeTodoFromDom(todo));
      updated.forEach(({ oldTodo, newTodo }) => updateTodoInDom(oldTodo, newTodo));

      // Update the old state
      oldTodoState = newTodos;
    }

    function deleteTodo(id) {
      // Filter out the todo with the given id
      todoState = todoState.filter(todo => todo.id !== id);
      updateState(todoState);
    }

    function addTodo() {
      const title = document.getElementById("title").value;
      const description = document.getElementById("description").value;
      todoState.push({
        title: title,
        description: description,
        id: globalId++,
      })
      updateState(todoState);
    }
  </script>
</head>

<body>
  <input type="text" id="title" placeholder="Todo title"></input> <br /><br />
  <input type="text" id="description" placeholder="Todo description"></input> <br /><br />
  <button onclick="addTodo()">Add todo</button>
  <br /> <br />

  <div id="todos">

  </div>
</body>

</html>
