<html lang="en">

<head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>ElevenLabs Signup</title>
    <link rel="stylesheet" href="https://fonts.googleapis.com/css2?family=Roboto:wght@400;700&display=swap" />
    <link rel="stylesheet" href="style.css" />
</head>

<body>
    <header>
        <h4>llElevenLabs</h4>
    </header>
    <div id="container">
        <h3>Create an account</h3>
        <div class="google-btn">
            <img src="https://img.icons8.com/?size=100&id=17949&format=png&color=000000" alt="Google" />
            <p>Sign up with Google</p>
        </div>
        <hr />
        <form>
            <label for="email">Email</label>
            <input type="email" id="email" name="email" />
            <label for="password">Password</label>
            <div class="password-wrapper">
                <input type="password" id="password" name="password" />
                <img src="https://img.icons8.com/?size=100&id=85028&format=png&color=00000069" alt="Show Password"
                    id="togglePassword" />
            </div>
            <button type="submit">Sign up</button>
        </form>
        <a href="#" class="signin-link">
            Already registered? <u>Sign in</u>
        </a>
    </div>
    <footer>
        By continuing, you agree to our
        <a href="#"><u>Terms of Service</u></a> and
        <a href="#"><u>Privacy Policy</u></a>.
    </footer>
</body>

</html>
